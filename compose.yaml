services:
  postgres:
    image: postgres:16-alpine
    container_name: options-chatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: options_chatbot
      POSTGRES_USER: options_chatbot
      POSTGRES_PASSWORD: options_chatbot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U options_chatbot -d options_chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
